spring.application.name=subastas

# ============================================================
# MySQL connection
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/subastas_bd?useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# Hibernate / JPA
# ============================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================================
# JWT
# ============================================================
app.jwt.secret=clave-secreta-subastas-uade-g16-2026-esta-clave-debe-tener-al-menos-256-bits
app.jwt.access-token-expiration=3600000
app.jwt.refresh-token-expiration=604800000

# ============================================================
# Mail (desactivado por defecto, se logea a consola)
# ============================================================
app.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=subastas-g16@ejemplo.com
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================================================
# Servidor
# ============================================================
server.port=8080

# ============================================================
# Logging
# ============================================================
logging.level.ar.edu.uade.grupo16.subastas=DEBUG
logging.level.org.springframework.security=INFO
